<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Scrape Results</title>
</head>
<body>
  <h1>Results for {{ url }}</h1>
  {% if emails %}
    <ul>
      {% for email in emails %}
        <li>{{ email }}</li>
      {% endfor %}
    </ul>
  {% else %}
    <p>No emails found or error fetching the page.</p>
  {% endif %}
  <p><a href="{{ url_for('index') }}">Back</a></p>
</body>
</html>
