<!DOCTYPE html>
<html>
<head>
    <title>AI QnA Bot 🤖</title>
</head>
<body>

<h2>🎓 University AI Chatbot</h2>

<div id="chatbox" style="border:1px solid black; height:250px; overflow:auto;"></div>

<input type="text" id="msg" placeholder="Ask something...">
<button onclick="sendMessage()">Send</button>

<script>
function sendMessage() {
    let msg = document.getElementById("msg").value;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += "<p><b>You:</b> " + msg + "</p>";

    fetch("/get", {
        method: "POST",
        body: new URLSearchParams({ msg: msg }),
        headers: { "Content-Type": "application/x-www-form-urlencoded" }
    })
    .then(res => res.json())
    .then(data => {
        chatbox.innerHTML += "<p><b>Bot:</b> " + data.response + "</p>";
    });

    document.getElementById("msg").value = "";
}
</script>

</body>
</html>
